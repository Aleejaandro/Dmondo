<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inspiración y Aplicaciones Industriales | DMONDO</title>
  <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>
  <header>
    <div class="container nav-container">
      <a href="/" class="logo" style="display: flex; align-items: center;">
        <img src="/assets/img/logo.png" alt="DMONDO" style="height: 80px; width: auto;" />
      </a>
      <button class="mobile-menu-btn" aria-label="Abrir menú" aria-expanded="false">☰</button>
      <nav class="nav-links">
        <a href="/productos/">Catálogo B2B</a>
        <a href="/recetas/" class="text-primary">Inspiración</a>

        <a href="/contacto.html" class="text-primary font-semibold">Hablar con ventas</a>
      </nav>

  </header>

  <main>
    <section class="container" style="padding-top: 3rem;">
      <div style="text-align: center; max-width: 700px; margin: 0 auto 3rem;">

        <p class="text-muted" style="font-size: 1.1rem;">Ideas de aplicación, tendencias de mercado y usos industriales de nuestro portfolio de ingredientes.</p>

      <div style="display: flex; justify-content: center; margin-bottom: 3rem;">
        <div class="form-group" style="min-width: 250px;">
          <label class="form-label text-center">Filtrar por origen</label>
          <select id="filter-receta-cocina" class="form-control">
            <option value="todas">Ver todas las aplicaciones</option>
            <option value="latina">Aplicaciones Latinas</option>
            <option value="arabe">Aplicaciones Árabes</option>

      <div id="recipes-grid" class="grid-3">
        <!-- Render via JS -->
      </div>

  <footer>
    <div class="container">
      <div class="footer-bottom">
        <p>DMONDO es el portfolio étnico del grupo ABM Crops.</p>
      </div>
    </div>
  </footer>

  <script type="module" src="/assets/js/app.js"></script>
